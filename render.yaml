services:
  - type: web
    name: e-dziennik
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /admin/login/
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: ""
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: ""
      - key: REDIS_URL
        value: ""
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: BOOTSTRAP_DIRECTOR_USERNAME
        sync: false
      - key: BOOTSTRAP_DIRECTOR_PASSWORD
        sync: false
      - key: BOOTSTRAP_DIRECTOR_EMAIL
        sync: false
      - key: USE_CLOUDINARY
        value: "True"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
